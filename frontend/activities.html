<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack — Activities</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Stats row ───────────────────────────────────── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: .85rem;
      margin-bottom: 1.5rem;
    }
    .stat-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .9rem 1rem;
    }
    .stat-box .sb-val { font-size: 1.55rem; font-weight: 800; }
    .stat-box .sb-lbl { font-size: .72rem; color: var(--text-secondary); margin-top: .2rem; }
    .c-blue   .sb-val { color: #2563eb; }
    .c-green  .sb-val { color: #16a34a; }
    .c-orange .sb-val { color: #d97706; }

    /* ── Section header ──────────────────────────────── */
    .sec-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; flex-wrap: wrap; gap: .5rem;
    }
    .sec-hd h1 { font-size: 1.45rem; font-weight: 800; }

    /* ── Activity type badge ─────────────────────────── */
    .type-badge {
      display: inline-block; padding: .18rem .55rem;
      border-radius: 4px; font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .type-gym    { background: #fef3c7; color: #92400e; }
    .type-cardio { background: #dcfce7; color: #15803d; }

    /* ── History table card ──────────────────────────── */
    .history-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .history-card h3 {
      font-size: .95rem; font-weight: 700; margin-bottom: 1rem;
    }
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      text-align: left; padding: .55rem .75rem;
      color: var(--text-secondary); font-weight: 600; font-size: .75rem;
      text-transform: uppercase; letter-spacing: .04em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: .6rem .75rem; border-bottom: 1px solid var(--border-light); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }
    .empty-row td {
      text-align: center; color: var(--text-muted);
      padding: 2.5rem; font-size: .875rem;
    }

    /* ── Recommendation panel ────────────────────────── */
    .rec-panel {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.25rem 1.4rem;
    }
    .rec-panel h3 {
      font-size: .95rem; font-weight: 700; margin-bottom: 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* rest-day banner */
    .rest-banner {
      background: #f5f3ff; border: 1px solid #ddd6fe;
      border-radius: 10px; padding: 1rem 1.1rem;
      margin-bottom: 1rem;
    }
    .rest-banner strong { color: #6d28d9; }
    .rest-banner p { font-size: .875rem; color: var(--text-muted); margin-top: .3rem; line-height: 1.55; }

    /* exercise plan block */
    .ex-plan {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: .85rem 1rem;
      margin-bottom: 1rem;
    }
    .ex-plan-title { font-weight: 700; font-size: .9rem; margin-bottom: .35rem; }
    .ex-plan-detail { font-size: .85rem; color: var(--text-muted); line-height: 1.55; }

    /* meal suggestions grid */
    .meal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: .85rem; margin-bottom: 1rem;
    }
    .meal-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: .85rem 1rem;
    }
    .meal-type {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: .4rem;
    }
    .meal-BREAKFAST { color: #92400e; }
    .meal-LUNCH     { color: #1d4ed8; }
    .meal-DINNER    { color: #991b1b; }
    .meal-SNACK     { color: #15803d; }

    .meal-name { font-weight: 700; font-size: .88rem; margin-bottom: .4rem; }
    .meal-cal  { font-size: 1.1rem; font-weight: 800; color: var(--text); }
    .meal-cal span { font-size: .72rem; font-weight: 400; color: var(--text-muted); }

    .meal-macros {
      display: flex; gap: .35rem; margin: .5rem 0;
    }
    .macro-pill {
      flex: 1; text-align: center; padding: .25rem .2rem;
      border-radius: 4px; font-size: .7rem;
    }
    .macro-pill .mp-val { font-weight: 700; display: block; font-size: .82rem; }
    .mp-p { background: #dbeafe; color: #1e40af; }
    .mp-c { background: #fef3c7; color: #92400e; }
    .mp-f { background: #fee2e2; color: #991b1b; }

    .meal-tip {
      font-size: .75rem; color: var(--text-muted); line-height: 1.5;
      border-top: 1px solid var(--border); padding-top: .45rem; margin-top: .45rem;
    }

    /* loading / empty */
    .rec-placeholder {
      text-align: center; padding: 2.5rem 1rem;
      color: var(--text-muted); font-size: .875rem;
    }
    .spinner-sm {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin .65s linear infinite;
      vertical-align: middle; margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* alert */
    .alert { padding: .65rem 1rem; border-radius: 8px; margin-bottom: .85rem;
             font-size: .84rem; font-weight: 500; border: 1px solid; }
    .alert-error { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebarContainer"></div>

  <main class="main-content">
    <div class="container" style="padding: 1.5rem 1.5rem 2.5rem;">

      <!-- Page header -->
      <div class="sec-hd" style="margin-top: 0;">
        <h1>Activities</h1>
        <button class="btn btn-primary btn-sm" id="genRecBtn" onclick="generateRec()">
          Get Tomorrow's Plan
        </button>
      </div>

      <!-- Today's stats -->
      <div class="stat-row">
        <div class="stat-box c-blue">
          <div class="sb-val" id="stat-gym">—</div>
          <div class="sb-lbl">Gym Sets Today</div>
        </div>
        <div class="stat-box c-green">
          <div class="sb-val" id="stat-cardio">—</div>
          <div class="sb-lbl">Cardio Sessions Today</div>
        </div>
        <div class="stat-box c-orange">
          <div class="sb-val" id="stat-cals">—</div>
          <div class="sb-lbl">Calories Burned Today</div>
        </div>
      </div>

      <!-- Activity history -->
      <div class="history-card">
        <h3>Activity History</h3>
        <div id="alertBox"></div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Exercise / Activity</th>
                <th>Details</th>
                <th>Calories</th>
                <th>Date &amp; Time</th>
              </tr>
            </thead>
            <tbody id="historyBody">
              <tr class="empty-row"><td colspan="5"><span class="spinner-sm"></span> Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Recommendation panel -->
      <div class="rec-panel">
        <h3>
          Tomorrow's Plan
          <span style="font-size:.72rem; color:var(--text-secondary); font-weight:400;">
            Based on today's gym &amp; cardio logs
          </span>
        </h3>
        <div id="recContent">
          <div class="rec-placeholder">
            Click <strong>Get Tomorrow's Plan</strong> to generate personalised meal and exercise recommendations.
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script>
requireAuth();
document.getElementById('sidebarContainer').innerHTML = renderSidebar();
initSidebar();

const MEAL_TYPE_ORDER = ['BREAKFAST', 'LUNCH', 'SNACK', 'DINNER'];

// ── Load activity history ─────────────────────────────
async function loadHistory() {
  try {
    const [sets, cardio] = await Promise.all([
      api.getAllSets(),
      api.getAllCardio(),
    ]);

    // ── Today's stat counters ──
    const today = new Date().toDateString();
    const todaySets   = (sets   || []).filter(s => new Date(s.loggedAt).toDateString() === today);
    const todayCardio = (cardio || []).filter(c => new Date(c.loggedAt).toDateString() === today);

    const todayCals =
      todaySets.reduce((n, s) => n + (s.caloriesBurned || 0), 0) +
      todayCardio.reduce((n, c) => n + (c.caloriesBurned || 0), 0);

    document.getElementById('stat-gym').textContent    = todaySets.length;
    document.getElementById('stat-cardio').textContent = todayCardio.length;
    document.getElementById('stat-cals').textContent   = Math.round(todayCals);

    // ── Merge + sort ──
    const rows = [
      ...(sets   || []).map(s => ({ kind: 'GYM',    data: s,  date: s.loggedAt })),
      ...(cardio || []).map(c => ({ kind: 'CARDIO', data: c,  date: c.loggedAt })),
    ].sort((a, b) => new Date(b.date) - new Date(a.date));

    renderHistory(rows);
  } catch (err) {
    document.getElementById('historyBody').innerHTML =
      `<tr class="empty-row"><td colspan="5">Failed to load history: ${escHtml(err.message)}</td></tr>`;
  }
}

function renderHistory(rows) {
  const tbody = document.getElementById('historyBody');
  if (!rows.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="5">No activity logged yet. Use the <a href="workout-tracker.html">Workout Tracker</a> to log gym sets or log cardio from the dashboard.</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(({ kind, data }) => {
    const badge = kind === 'GYM'
      ? `<span class="type-badge type-gym">Gym</span>`
      : `<span class="type-badge type-cardio">Cardio</span>`;

    let name, details, cals;

    if (kind === 'GYM') {
      name    = escHtml(data.exerciseName || '—');
      const mg = data.muscleGroup ? `<span style="font-size:.72rem;color:var(--text-muted);">${data.muscleGroup.replace('_',' ')}</span>` : '';
      details = `${data.sets || '?'}×${data.reps || '?'} @ ${data.weightKg > 0 ? data.weightKg + ' kg' : 'BW'} ${data.isPR ? '&nbsp;<span class="type-badge" style="background:#fef3c7;color:#92400e;">⭐ PR</span>' : ''}<br>${mg}`;
      cals    = data.caloriesBurned ? Math.round(data.caloriesBurned) : '—';
    } else {
      name    = escHtml(formatType(data.activityType || 'Cardio'));
      const dist = data.distanceKm ? ` · ${data.distanceKm} km` : '';
      const ct   = data.cardioType ? ` · ${data.cardioType.replace('_',' ')}` : '';
      details = `${data.durationMinutes || '?'} min${dist}${ct}`;
      cals    = data.caloriesBurned ? Math.round(data.caloriesBurned) : '—';
    }

    const dt = data.loggedAt ? formatDateTime(data.loggedAt) : '—';

    return `
      <tr>
        <td>${badge}</td>
        <td style="font-weight:600;">${name}</td>
        <td style="font-size:.82rem;color:var(--text-muted);">${details}</td>
        <td><span class="badge badge-green">${cals} kcal</span></td>
        <td style="font-size:.8rem;color:var(--text-muted);">${dt}</td>
      </tr>`;
  }).join('');
}

// ── Generate daily recommendation ────────────────────
async function generateRec() {
  const btn = document.getElementById('genRecBtn');
  setLoading(btn, true);

  const el = document.getElementById('recContent');
  el.innerHTML = `<div class="rec-placeholder"><span class="spinner-sm"></span> Generating your plan…</div>`;

  try {
    const rec = await api.getDailyRecommendation();
    renderRec(rec);
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">Could not generate plan: ${escHtml(err.message)}</div>`;
  } finally {
    setLoading(btn, false);
  }
}

function renderRec(rec) {
  let html = '';

  // ── Rest-day banner ──
  if (rec.restDayRecommended) {
    html += `
      <div class="rest-banner">
        <strong>Rest Day Recommended — ${rec.consecutiveGymDays} consecutive gym days</strong>
        <p>${escHtml(rec.restDayReason)}</p>
      </div>`;
  }

  // ── Exercise plan ──
  html += `
    <div class="ex-plan">
      <div class="ex-plan-title">Tomorrow's Exercise: ${escHtml(rec.exercisePlan)}</div>
      <div class="ex-plan-detail">${escHtml(rec.exercisePlanDetail)}</div>
    </div>`;

  // ── Meal suggestions ──
  if (rec.mealSuggestions && rec.mealSuggestions.length) {
    html += `<div style="font-weight:700;font-size:.88rem;margin-bottom:.75rem;">Tomorrow's Meals</div>`;
    html += `<div class="meal-grid">`;

    const ordered = [...rec.mealSuggestions].sort(
      (a, b) => MEAL_TYPE_ORDER.indexOf(a.mealType) - MEAL_TYPE_ORDER.indexOf(b.mealType)
    );

    html += ordered.map(m => `
      <div class="meal-card">
        <div class="meal-type meal-${m.mealType}">${m.mealType.replace('_', ' ')}</div>
        <div class="meal-name">${escHtml(m.foodName)}</div>
        <div class="meal-cal">${m.calories} <span>kcal</span></div>
        <div class="meal-macros">
          <div class="macro-pill mp-p"><span class="mp-val">${m.proteinG}g</span>Protein</div>
          <div class="macro-pill mp-c"><span class="mp-val">${m.carbsG}g</span>Carbs</div>
          <div class="macro-pill mp-f"><span class="mp-val">${m.fatG}g</span>Fat</div>
        </div>
        <div class="meal-tip">${escHtml(m.tip)}</div>
      </div>`).join('');

    html += `</div>`;
  }

  document.getElementById('recContent').innerHTML = html;
}

// ── Helper ────────────────────────────────────────────
function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

loadHistory();
</script>
</body>
</html>
