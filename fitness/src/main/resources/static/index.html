<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>Fit<span>Track</span></h1>
      <p>Your Nepali-friendly fitness & nutrition companion</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</div>
        <div class="auth-tab" id="registerTab" onclick="switchTab('register')">Register</div>
      </div>

      <div id="alertBox"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Login</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="hidden">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" class="form-control" id="regFirstName" placeholder="Ram" required />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" class="form-control" id="regLastName" placeholder="Sharma" required />
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" id="regEmail" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" id="regPassword" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="registerBtn">Create Account</button>
      </form>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

  function switchTab(tab) {
    document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
    document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
    document.getElementById('loginTab').classList.toggle('active', tab === 'login');
    document.getElementById('registerTab').classList.toggle('active', tab === 'register');
    document.getElementById('alertBox').innerHTML = '';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    setLoading(btn, true);
    try {
      const res = await api.login({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value,
      });
      storeUser(res);
      window.location.href = '/dashboard.html';
    } catch (err) {
      showAlert('alertBox', err.message || 'Invalid credentials');
    } finally {
      setLoading(btn, false);
    }
  });

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    setLoading(btn, true);
    try {
      await api.register({
        firstName: document.getElementById('regFirstName').value,
        lastName: document.getElementById('regLastName').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value,
      });
      // Auto-login after register
      const res = await api.login({
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value,
      });
      storeUser(res);
      window.location.href = '/dashboard.html';
    } catch (err) {
      showAlert('alertBox', err.message || 'Registration failed');
    } finally {
      setLoading(btn, false);
    }
  });

  function storeUser(res) {
    localStorage.setItem('token', res.token);
    localStorage.setItem('userId', res.user.id);
    localStorage.setItem('email', res.user.email);
    localStorage.setItem('firstName', res.user.firstName || '');
    localStorage.setItem('lastName', res.user.lastName || '');
  }
</script>
</body>
</html>
